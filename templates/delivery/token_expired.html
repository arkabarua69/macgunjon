{% extends 'base.html' %}
{% block title %}Download Expired - Mac GunJon{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0 p-5">
        <div class="mb-4">
          <i data-lucide="alert-triangle" class="ic-64" style="color:var(--warning);"></i>
        </div>
        <h2 class="fw-bold mb-3">Download Link Expired</h2>
        <p class="text-muted mb-4">This download link has expired or reached its maximum download limit. Please contact support to get a new download link.</p>
        <a href="{% url 'pages:contact' %}" class="btn btn-primary btn-lg px-4">
          <i data-lucide="mail"></i> Contact Support
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
