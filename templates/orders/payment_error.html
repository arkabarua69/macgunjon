{% extends 'base.html' %}

{% block title %}Payment Error — Mac GunJon - Is Bot{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="mb-4">
        <i data-lucide="alert-triangle" class="ic-64 text-error opacity-75"></i>
      </div>
      <h2 class="fw-bold mb-3">Payment Error</h2>
      <p class="text-muted mb-4">
        {% if error %}
          {{ error }}
        {% else %}
          Something went wrong while processing your payment. Please try again.
        {% endif %}
      </p>
      <div class="d-flex gap-3 justify-content-center">
        <a href="{% url 'cart:cart_detail' %}" class="btn btn-outline-danger fw-bold">
          <i data-lucide="shopping-cart" class="ic-16 va-middle mr-2"></i>Back to Cart
        </a>
        <a href="{% url 'products:product_list' %}" class="btn btn-danger fw-bold">
          <i data-lucide="store" class="ic-16 va-middle mr-2"></i>Browse Products
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
