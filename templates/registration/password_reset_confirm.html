{% extends 'base.html' %}
{% load static %}

{% block title %}Set New Password — Mac GunJon{% endblock %}

{% block content %}
<div class="form-page-wrap">
  <div class="form-card animate-fade" data-aos="fade-up">
    <div class="form-card-header">
      <div class="form-icon"><i data-lucide="lock"></i></div>
      <h2>Set New Password</h2>
      <p>Enter your new password below</p>
    </div>
    <div class="form-card-body">
      <form method="post">
        {% csrf_token %}
        <div class="floating-group">
          <label>New Password</label>
          <input type="password" name="new_password1" class="form-control" required>
        </div>
        <div class="floating-group">
          <label>Confirm Password</label>
          <input type="password" name="new_password2" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-3 mt-2">
          <i data-lucide="check" class="ic-18 va-middle mr-2"></i>Set Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
