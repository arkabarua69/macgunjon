{% extends 'base.html' %}
{% load static %}

{% block title %}Reset Password — Mac GunJon{% endblock %}

{% block content %}
<div class="form-page-wrap">
  <div class="form-card animate-fade" data-aos="fade-up">
    <div class="form-card-header">
      <div class="form-icon"><i data-lucide="key"></i></div>
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send you a reset link</p>
    </div>
    <div class="form-card-body">
      <form method="post">
        {% csrf_token %}
        <div class="floating-group">
          <label>Email Address</label>
          <input type="email" name="email" class="form-control" required placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-3 mt-2">
          <i data-lucide="send" class="ic-18 va-middle mr-2"></i>Send Reset Link
        </button>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'users:login' %}" class="text-decoration-none small">
          <i data-lucide="arrow-left" class="ic-14 va-middle mr-2"></i>Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
